# Server
server.port=8080

# Application name
spring.application.name=monitoring-api

# ML Service URL (Python FastAPI running on port 8000)
ml.service.url=http://localhost:8000

# RestTemplate timeouts (milliseconds)
ml.service.connect-timeout=5000
ml.service.read-timeout=5000

# Anomaly alert threshold (scores below this = critical)
monitoring.anomaly.alert-threshold=-0.60
monitoring.anomaly.history-size=1000

# Logging - show your own code logs, suppress Spring noise
logging.level.com.backend.monitoring_api=INFO
logging.level.org.springframework=WARN
logging.level.org.springframework.web.client=DEBUG